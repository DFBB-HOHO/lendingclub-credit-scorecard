name: Unpack repository

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Expand project package
        run: |
          unzip -o lendingclub-credit-scorecard.zip
          rm lendingclub-credit-scorecard.zip

          # 暂时不让机器人修改 workflow 文件
          rm -f .github/workflows/tests.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "Build LendingClub credit scorecard project"
          git push
